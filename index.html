<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P36 PORTAL - v6.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #0b1120; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .input-p36 { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 14px; width: 100%; color: white; outline: none; }
        #video-container { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .btn-call { background: linear-gradient(135deg, #0ea5e9, #0284c7); transition: 0.3s; }
        .btn-call:active { scale: 0.9; }
    </style>
</head>
<body>

    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[2.5rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-sky-500 mb-8 italic">P36 <span class="text-white">ID</span></h1>
            <div class="space-y-4 text-right">
                <input type="text" id="reg-name" placeholder="الاسم المستعار" class="input-p36">
                <input type="email" id="reg-email" placeholder="الإيميل" class="input-p36">
                <input type="password" id="reg-pass" placeholder="كلمة السر" class="input-p36">
                <button onclick="handleAuth()" class="w-full bg-sky-600 p-4 rounded-2xl font-black shadow-lg">دخول / تسجيل</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="p-6 glass flex justify-between items-center sticky top-0 z-50">
            <div>
                <h2 id="user-display" class="font-black text-sky-400">...</h2>
                <p id="status-text" class="text-[9px] text-green-500 font-bold tracking-tighter italic">متصل بالشبكة</p>
            </div>
            <button onclick="logout()" class="text-red-500 p-2"><i class="fas fa-power-off"></i></button>
        </header>

        <main class="p-6 space-y-4">
            <div class="relative">
                <input type="text" id="search-input" oninput="searchUsers()" placeholder="ابحث عن أصدقاء..." class="input-p36 bg-slate-900/50 pr-10">
            </div>
            <div id="users-list" class="grid gap-3"></div>
        </main>
    </div>

    <div id="video-container">
        <div id="remote-player" class="flex-1 bg-black"></div>
        <div id="local-player" class="h-1/3 bg-slate-900 border-t border-white/10 relative"></div>
        <div class="absolute bottom-10 left-0 right-0 flex justify-center">
            <button onclick="endCall()" class="w-16 h-16 bg-red-600 rounded-full shadow-2xl flex items-center justify-center"><i class="fas fa-phone-slash text-xl"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD2jHFMOLE1QXVhCFd0FXB_BKMp8W62cME",
            authDomain: "abood-p36.firebaseapp.com",
            projectId: "abood-p36",
            storageBucket: "abood-p36.firebasestorage.app",
            messagingSenderId: "780692902080",
            appId: "1:780692902080:web:66d6437b8fd56dd1bd1d25"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // طلب الإذن فور التشغيل
        async function requestPermissions() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                stream.getTracks().forEach(track => track.stop());
                console.log("Permissions granted");
            } catch (err) {
                alert("يرجى السماح للكاميرا والميكروفون بالعمل من إعدادات المتصفح لتتمكن من الاتصال.");
            }
        }

        window.handleAuth = async () => {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
                await setDoc(doc(db, "users", res.user.uid), { name, uid: res.user.uid });
            }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.displayName;
                requestPermissions(); // اطلب الإذن بعد تسجيل الدخول
                searchUsers();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        window.searchUsers = async () => {
            const term = document.getElementById('search-input').value.toLowerCase();
            const snap = await getDocs(collection(db, "users"));
            const list = document.getElementById('users-list');
            list.innerHTML = '';
            snap.forEach(uDoc => {
                const data = uDoc.data();
                if(uDoc.id !== auth.currentUser.uid && (!term || data.name.toLowerCase().includes(term))) {
                    list.insertAdjacentHTML('beforeend', `
                        <div class="glass p-5 rounded-2xl flex justify-between items-center shadow-lg">
                            <span class="font-bold text-lg">${data.name}</span>
                            <button onclick="startCall()" class="w-12 h-12 btn-call rounded-xl flex items-center justify-center text-white shadow-md"><i class="fas fa-video"></i></button>
                        </div>
                    `);
                }
            });
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        window.startCall = async () => {
            document.getElementById('video-container').style.display = 'flex';
            try {
                await client.join("7d4d426372074e508892f39239845700", "p36_main", null, null);
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                
                localTracks.videoTrack.play("local-player");
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
                
                client.on("user-published", async (user, type) => {
                    await client.subscribe(user, type);
                    if(type === 'video') user.videoTrack.play("remote-player");
                    if(type === 'audio') user.audioTrack.play();
                });
            } catch (e) {
                console.error(e);
                alert("تأكد من إعطاء صلاحية الكاميرا!");
                endCall();
            }
        };

        window.endCall = async () => {
            if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            if(localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            await client.leave();
            document.getElementById('video-container').style.display = 'none';
        };

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
